# Firebase App Hosting environment configuration.
runConfig:
  vpcAccess:
    # 알리고 API의 IP 인증을 통과하기 위해 모든 외부 트래픽을
    # Cloud NAT(dallem-sib-nat)의 고정 IP 34.81.89.11로 내보낸다.
    egress: ALL_TRAFFIC
    networkInterfaces:
      - network: default
        subnetwork: default
env:
  - variable: NEXT_PUBLIC_GA_MEASUREMENT_ID
    value: G-K7092CYHWZ
    availability:
      - BUILD
      - RUNTIME
  - variable: GA_PROPERTY_ID
    value: "527817023"
    availability:
      - RUNTIME
  - variable: GA_PAGE_PATH
    value: /
    availability:
      - RUNTIME
  - variable: GOOGLE_SHEETS_ANALYTICS_SHEET_GID
    value: "1695159350"
    availability:
      - RUNTIME
  - variable: ANALYTICS_SYNC_SECRET
    secret: ANALYTICS_SYNC_SECRET
    availability:
      - RUNTIME
  - variable: ALIGO_API_KEY
    secret: ALIGO_API_KEY
    availability:
      - RUNTIME
  - variable: ALIGO_USER_ID
    secret: ALIGO_USER_ID
    availability:
      - RUNTIME
  - variable: ALIGO_SENDER
    secret: ALIGO_SENDER
    availability:
      - RUNTIME
  - variable: ALIGO_SMS_ENABLED
    value: "N"
    availability:
      - RUNTIME
